<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" fill="#3498db"/>
  
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#grad)"/>
  
  <!-- Game icon - steering wheel -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="white" stroke-width="20"/>
  <circle cx="256" cy="256" r="40" fill="white"/>
  <line x1="256" y1="116" x2="256" y2="176" stroke="white" stroke-width="20"/>
  <line x1="256" y1="336" x2="256" y2="396" stroke="white" stroke-width="20"/>
  <line x1="116" y1="256" x2="176" y2="256" stroke="white" stroke-width="20"/>
  <line x1="336" y1="256" x2="396" y2="256" stroke="white" stroke-width="20"/>
  
  <!-- Text -->
  <text x="256" y="460" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">GestureX</text>
</svg>
